<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portofolio — Futuristik | Hitam & Kuning</title>

  <!-- Tailwind & Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            'brand-yellow': '#FFD400',
            'bg-deep': '#050506',
            'panel': '#0f1113'
          }
        }
      }
    }
  </script>

  <style>
    html, body { height: 100%; scroll-behavior: smooth; }
    .neon { text-shadow: 0 0 8px rgba(255, 212, 0, 0.12), 0 0 24px rgba(255, 212, 0, 0.06); }

    /* GRID background kecil */
    .grid-bg {
      background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* ===== BACKGROUND FUTURISTIK ===== */
    .motion-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, #050506, #0a0a0a, #111111, #0a0a0a, #050506);
      background-size: 400% 400%;
      animation: gradientMove 20s ease infinite;
      z-index: -3;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }

    .particles span {
      position: absolute;
      display: block;
      width: 6px;
      height: 6px;
      background: rgb(255, 213, 0);
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0.8;
      animation: floaty 10s ease-in-out infinite;
    }

    .particles span:nth-child(odd) {
      background: rgb(255, 255, 255);
      width: 8px;
      height: 8px;
      opacity: 0.6;
    }

    @keyframes floaty {
      0% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-30px) translateX(20px); }
      100% { transform: translateY(0) translateX(0); }
    }

    /* ===== Efek Ripple / Air ===== */
    #rippleCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>

<body class="bg-bg-deep font-inter text-gray-200 antialiased relative overflow-x-hidden">

  <!-- Background bergerak -->
  <div class="motion-bg" aria-hidden="true"></div>

  <!-- Partikel lembut -->
  <div class="particles" aria-hidden="true">
    <span style="top:10%;left:20%;animation-delay:0s;"></span>
    <span style="top:30%;left:60%;animation-delay:1s;"></span>
    <span style="top:70%;left:40%;animation-delay:2s;"></span>
    <span style="top:50%;left:80%;animation-delay:3s;"></span>
    <span style="top:90%;left:10%;animation-delay:4s;"></span>
    <span style="top:20%;left:70%;animation-delay:5s;"></span>
    <span style="top:40%;left:30%;animation-delay:6s;"></span>
    <span style="top:75%;left:50%;animation-delay:7s;"></span>
  </div>

  <!-- Canvas efek air -->
  <canvas id="rippleCanvas"></canvas>

  <!-- SEMUA KONTEN WEBSITE KAMU (navbar, hero, about, projects, contact, footer) -->
  <!-- 🔽 tempel seluruh blok HTML kamu dari <div class="min-h-screen grid ..."> sampai </div> terakhir -->
  <!-- (tidak perlu diubah apapun dari konten yang kamu sudah punya) -->
  
  <!-- ... seluruh konten kamu di sini ... -->

  <script>
    // ===== Ripple Interaktif (efek air mengikuti mouse) =====
    const canvas = document.getElementById('rippleCanvas');
    const ctx = canvas.getContext('2d');
    let ripples = [];
    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    window.addEventListener('resize', () => {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    });

    document.addEventListener('mousemove', (e) => {
      ripples.push({
        x: e.clientX,
        y: e.clientY,
        radius: 0,
        alpha: 0.35
      });
    });

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ripples.forEach((r, i) => {
        ctx.beginPath();
        ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 212, 0, ${r.alpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        r.radius += 1.5;
        r.alpha -= 0.005;

        if (r.alpha <= 0) ripples.splice(i, 1);
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
